app = "prox-challenge-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DEPLOYMENT_ENV = "fly"
  ENABLE_LOCAL_TTS = "false"
  ENABLE_SEMANTIC_SEARCH = "false"
  STRICT_STARTUP_VALIDATION = "false"
  PAGE_RENDER_DPI = "120"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
