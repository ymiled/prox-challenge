app = 'vulcan-omnipro-assistant'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DEPLOYMENT_ENV = 'production'
  ENABLE_LOCAL_TTS = 'false'
  ENABLE_SEMANTIC_SEARCH = 'false'
  PAGE_RENDER_DPI = '120'
  PORT = '8000'
  SESSION_COOKIE_SAMESITE = 'lax'
  STRICT_STARTUP_VALIDATION = 'false'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '60s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    protocol = 'http'
    timeout = '5s'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
