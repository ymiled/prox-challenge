services:
  - type: web
    name: prox-challenge-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: |
      pip install uv
      uv sync
      uv run python tools/build_cache.py
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PROX_HOSTED_DEMO
        value: "true"
      - key: ENABLE_LOCAL_TTS
        value: "false"
      - key: ENABLE_SEMANTIC_SEARCH
        value: "false"
      - key: STRICT_STARTUP_VALIDATION
        value: "false"
      - key: PAGE_RENDER_DPI
        value: "120"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
